<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>試験申込みサンプルサイト</title>

    <!-- Bootstrap core CSS -->
    <link href="inlucde/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom styles for this template -->
    <link href="inlucde/css/signin.css" rel="stylesheet">

    <link rel="canonical" href="https://atgo.rgsis.com/demo/exam/">
</head>

<body class="text-center">
    <form class="form-signin" method="get" action="booking.html" autocomplete="off" >
        <img class="mb-4" src="inlucde/img/logo-1.png" alt="" width="144">
        <h1 class="h4 mb-3 font-weight-normal">試験申込み</h1>
        <label for="id_email" class="sr-only">メールアドレス</label>
        <input type="email" id="id_email" class="form-control" placeholder="メールアドレス" required autofocus autocomplete="off" maxlength="15">
        <label for="inputPassword" class="sr-only">パスワード</label>
        <input type="password" id="inputPassword" class="form-control" placeholder="パスワード" required>
        <div class="checkbox mb-3">
            <label>
                <input type="checkbox" id="id_remember" value="remember-me"> ログイン情報を記憶する
            </label>
        </div>
        <button class="btn btn-lg btn-primary btn-block" id="id_login" type="submit">ログイン</button>

        
        <footer class="my-4 pt-4 text-muted text-small">
          <p class="mb-1"><small>こちらはATgoのサンプルにご利用いただけるテスト用サイトです。入力データについて、DBなどサーバー側での保存はございません。</small></p>
        </footer>
    </form>
    
</body>



</html>
